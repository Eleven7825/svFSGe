name: FSGe CI Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      regenerate_n660:
        description: "Regenerate the n660 neural-operator reference from THIS runner and commit it (blesses the runner-specific torch output; skips the strict n660 comparison)"
        type: boolean
        default: false

# contents: write is needed only for the manual regenerate_n660 dispatch, which
# commits the refreshed reference back to the branch.
permissions:
  contents: write

jobs:
  test-fsg:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create directories for volumes
        run: |
          mkdir -p svMultiPhysics
          mkdir -p test_output

      - name: Pull Docker image
        run: |
          docker pull simvascular/solver:latest

      - name: Run FSGe test in Docker container
        id: docker_test
        continue-on-error: true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/svMultiPhysics:/svfsi \
            -v ${{ github.workspace }}:/svFSGe \
            simvascular/solver:latest \
            /bin/bash -c '
              set -e

              echo "================================"
              echo "Cloning svMultiPhysics..."
              echo "================================"

              # Fix Git ownership issues in Docker
              git config --global --add safe.directory /svfsi
              git config --global --add safe.directory /svFSGe

              cd /svfsi
              git init
              git remote add origin https://github.com/Eleven7825/svMultiPhysics.git
              git fetch --depth=1 origin FSGe
              git checkout -b FSGe origin/FSGe

              echo ""
              echo "================================"
              echo "Building svFSIplus..."
              echo "================================"
              bash makeCommand.sh 2>&1 | tee /svFSGe/test_output/build.log

              echo ""
              echo "================================"
              echo "Installing Python dependencies..."
              echo "================================"
              pip install -r /svFSGe/requirements.txt 2>&1 | tee /svFSGe/test_output/pip_install.log

              echo ""
              echo "================================"
              echo "Running FSGe test 1/2: standard FSI (nmax=2)..."
              echo "================================"
              cd /svFSGe
              python3 ./fsg.py in_sim/partitioned_test.json 2>&1 | tee /svFSGe/test_output/test_run.log

              # Capture this run dir BEFORE the next run is created (the
              # partitioned_* glob would otherwise also match the n660 dir).
              STD_DIR=$(ls -dt partitioned_2* 2>/dev/null | grep -v "partitioned_test_n660" | head -1)
              if [ -z "$STD_DIR" ]; then
                echo "ERROR: No standard results directory found!"
                exit 1
              fi
              echo "Standard results in: $STD_DIR"
              cp -r "$STD_DIR" /svFSGe/test_output/standard

              echo ""
              echo "================================"
              echo "Running FSGe test 2/2: neural-operator n660 surrogate (nmax=2)..."
              echo "================================"
              # The neural-operator surrogate needs torch (CPU is enough); the
              # base image does not ship it, so install the CPU wheel here. The
              # standard test above runs without torch (lazy import in fsg.py).
              pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu 2>&1 | tee /svFSGe/test_output/pip_torch.log
              python3 ./fsg.py in_sim/partitioned_test_n660.json 2>&1 | tee /svFSGe/test_output/test_run_n660.log

              N660_DIR=$(ls -dt partitioned_test_n660_* 2>/dev/null | head -1)
              if [ -z "$N660_DIR" ]; then
                echo "ERROR: No n660 results directory found!"
                exit 1
              fi
              echo "n660 results in: $N660_DIR"
              cp -r "$N660_DIR" /svFSGe/test_output/n660

              echo ""
              echo "Test execution completed successfully!"
            '

      - name: Check test execution status
        if: always()
        run: |
          if [ "${{ steps.docker_test.outcome }}" != "success" ]; then
            echo "❌ Docker test step failed!"
            echo ""
            echo "Checking for error logs..."
            if [ -f test_output/build.log ]; then
              echo "=== Build log (last 50 lines) ==="
              tail -50 test_output/build.log
            fi
            if [ -f test_output/test_run.log ]; then
              echo "=== Standard test run log (last 50 lines) ==="
              tail -50 test_output/test_run.log
            fi
            if [ -f test_output/test_run_n660.log ]; then
              echo "=== n660 test run log (last 50 lines) ==="
              tail -50 test_output/test_run_n660.log
            fi
            exit 1
          else
            echo "✅ Docker test step completed successfully"
          fi

      - name: List test output
        if: always()
        run: |
          echo "Test output directory contents:"
          ls -la test_output/ || echo "test_output directory is empty or missing"
          for d in standard n660; do
            if [ -d "test_output/$d" ]; then
              echo ""
              echo "$d results directory contents:"
              ls -la "test_output/$d/"
            else
              echo "No $d results found in test_output/"
            fi
          done

      - name: Install comparison dependencies
        if: success()
        run: pip install numpy meshio

      - name: Compare standard FSI results with reference
        if: success()
        run: |
          echo "================================"
          echo "Comparing standard FSI results with reference baseline..."
          echo "================================"

          RESULT_DIR=test_output/standard
          if [ ! -f "$RESULT_DIR/partitioned.json" ]; then
            echo "ERROR: No standard test results found in $RESULT_DIR"
            echo "The simulation may have failed. Check the test execution logs above."
            exit 1
          fi

          echo "Test results: $RESULT_DIR/partitioned.json"
          echo "Reference:    test_reference/nmax_2/reference_results.json"
          echo ""

          python3 scripts/compare_results.py \
            test_reference/nmax_2/reference_results.json \
            "$RESULT_DIR/partitioned.json" \
            --ref-vtu test_reference/nmax_2/tube_002.vtu \
            --test-vtu "$RESULT_DIR/partitioned/converged/tube_002.vtu"

      - name: Regenerate n660 reference (manual dispatch)
        if: success() && github.event_name == 'workflow_dispatch' && github.event.inputs.regenerate_n660 == 'true'
        run: |
          echo "================================"
          echo "Regenerating n660 reference from this runner's output..."
          echo "================================"
          RESULT_DIR=test_output/n660
          if [ ! -f "$RESULT_DIR/partitioned_test_n660.json" ]; then
            echo "ERROR: No n660 test results found in $RESULT_DIR"; exit 1
          fi
          # Rebuild the curated reference_results.json (convergence.error + config),
          # mirroring the format documented in test_reference/nmax_2/README.md.
          python3 - "$RESULT_DIR/partitioned_test_n660.json" <<'PY'
          import json, sys
          full = json.load(open(sys.argv[1]))
          ref = {
              "description": "Reference convergence data for the FSGe n660 neural-operator CI test (nmax=2)",
              "generated_from": "CI runner via workflow_dispatch regenerate_n660",
              "configuration": {
                  "nloads": full.get("nloads", full.get("nmax", 2)),
                  "n_procs": full.get("n_procs", {}),
                  "coup": {"method": full.get("coup", {}).get("method", ""),
                           "tol": full.get("coup", {}).get("tol", 0)},
              },
              "convergence": {"error": full.get("error", {})},
          }
          json.dump(ref, open("test_reference/n660_nmax_2/reference_results.json", "w"), indent=2)
          print("wrote test_reference/n660_nmax_2/reference_results.json")
          PY
          cp "$RESULT_DIR/partitioned/converged/tube_002.vtu" test_reference/n660_nmax_2/tube_002.vtu
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test_reference/n660_nmax_2/reference_results.json test_reference/n660_nmax_2/tube_002.vtu
          if git diff --cached --quiet; then
            echo "n660 reference already up to date; nothing to commit."
          else
            git commit -m "CI: regenerate n660 reference from runner [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            echo "Committed refreshed n660 reference."
          fi

      - name: Compare neural-operator (n660) results with reference
        if: success() && github.event.inputs.regenerate_n660 != 'true'
        run: |
          echo "================================"
          echo "Comparing neural-operator n660 results with reference baseline..."
          echo "================================"

          RESULT_DIR=test_output/n660
          if [ ! -f "$RESULT_DIR/partitioned_test_n660.json" ]; then
            echo "ERROR: No n660 test results found in $RESULT_DIR"
            echo "The simulation may have failed. Check the test execution logs above."
            exit 1
          fi

          echo "Test results: $RESULT_DIR/partitioned_test_n660.json"
          echo "Reference:    test_reference/n660_nmax_2/reference_results.json"
          echo ""

          python3 scripts/compare_results.py \
            test_reference/n660_nmax_2/reference_results.json \
            "$RESULT_DIR/partitioned_test_n660.json" \
            --ref-vtu test_reference/n660_nmax_2/tube_002.vtu \
            --test-vtu "$RESULT_DIR/partitioned/converged/tube_002.vtu"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fsg-test-results
          path: |
            test_output/
            !test_output/**/partitioned/fluid_*.vtu
            !test_output/**/partitioned/solid_*.vtu
            !test_output/**/partitioned/mesh_*.vtu
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload convergence plot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: convergence-plot
          path: test_output/**/convergence.png
          retention-days: 30
          if-no-files-found: warn

      - name: Test summary
        if: always()
        run: |
          echo "================================"
          echo "Test Summary"
          echo "================================"
          echo "Status: ${{ job.status }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run number: ${{ github.run_number }}"
          echo "================================"
